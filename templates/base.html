<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
{% load static %}
<head>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rezume Free Template by Colorlib</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
          content="Professional resume and portfolio template showcasing your skills, work experience, and projects. Built with Bootstrap 5.">
    <meta name="author" content="Charles Anderson">
    <link rel="canonical" href="https://example.com/">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Rezume - Personal Resume Template">
    <meta property="og:description"
          content="Professional resume and portfolio template showcasing your skills, work experience, and projects.">
    <meta property="og:image" content="images/image_1.jpg">
    <meta property="og:url" content="https://example.com/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Rezume - Personal Resume Template">
    <meta name="twitter:description"
          content="Professional resume and portfolio template showcasing your skills, work experience, and projects.">
    <meta name="twitter:image" content="images/image_1.jpg">

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Critical CSS (render-blocking) -->
    <link rel="stylesheet" href="../static/fonts/icomoon/style.css' %}" fetchpriority="high">
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}" fetchpriority="high">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Non-critical CSS (non-blocking) -->
    <link rel="stylesheet" href="{% static 'css/aos.css' %}" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="{% static 'css/glightbox.min.css' %}" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="{% static 'css/aos.css' %}">
        <link rel="stylesheet" href="{% static 'css/glightbox.min.css' %}">
    </noscript>

    <!-- Google Fonts (non-blocking) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400;700&display=swap"
          as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
              href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400;700&display=swap">
    </noscript>
</head>
<body data-bs-spy="scroll" data-bs-target="#pb-navbar" data-bs-offset="200">

<!-- Skip to main content link for accessibility -->
<a href="index.html#main-content" class="skip-link visually-hidden-focusable">Skip to main content</a>

<nav class="navbar navbar-expand-lg site-navbar navbar-light bg-light" id="pb-navbar" aria-label="Main navigation">

    <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample09"
                aria-controls="navbarsExample09" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>


        <div class="collapse navbar-collapse justify-content-md-center" id="navbarsExample09">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html#section-home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#section-portfolio">Portfolio</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#section-resume">Resume</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#section-about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#section-contact">Contact</a></li>
            </ul>
        </div>
        <button id="darkModeToggle" class="btn btn-link p-2 ms-2 dark-mode-toggle" aria-label="Toggle dark mode">
            <svg class="toggle-icon toggle-icon--sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="toggle-icon toggle-icon--moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</nav>

<main id="main-content">

{% block content %}

{% endblock %}


</main>

        <div class="row mb-5">
            <p class="col-12 text-center">
                <!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
                Copyright &copy;
                <script>document.write(new Date().getFullYear());</script>
                All rights reserved | This template is made with <i class="icon-heart text-danger"
                                                                    aria-hidden="true"></i> by <a
                    href="https://colorlib.com" target="_blank" class="text-primary">Colorlib</a>
                <!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
            </p>
        </div>

        <div class="row mb-5">
            <div class="col-md-12 text-center">
                <p>
                    <a href="index.html#" class="social-item" aria-label="Facebook"><span class="icon-facebook2"
                                                                                          aria-hidden="true"></span></a>
                    <a href="index.html#" class="social-item" aria-label="Twitter"><span class="icon-twitter"
                                                                                         aria-hidden="true"></span></a>
                    <a href="index.html#" class="social-item" aria-label="Instagram"><span class="icon-instagram2"
                                                                                           aria-hidden="true"></span></a>
                    <a href="index.html#" class="social-item" aria-label="LinkedIn"><span class="icon-linkedin2"
                                                                                          aria-hidden="true"></span></a>
                    <a href="index.html#" class="social-item" aria-label="Vimeo"><span class="icon-vimeo"
                                                                                       aria-hidden="true"></span></a>
                </p>
            </div>
        </div>

    </div>
</footer>


<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
<script src="{% static 'js/glightbox.min.js' %}"></script>
<script src="{% static 'js/aos.js' %}"></script>
<script src="{% static 'js/main.js' %}"></script>

<!-- Google Analytics (placeholder - update with your GA4 ID) -->

</script>

</body>
</html>
